name: Generate metrics

on:
  schedule:
    - cron: "0 */12 * * *"   # twice a day
  workflow_dispatch:          # allow manual runs
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Generate github-metrics.svg
        uses: lowlighter/metrics@latest
        with:
          # A read-only Personal Access Token stored as the METRICS_TOKEN repo secret
          token: ${{ secrets.METRICS_TOKEN }}
          user: dhwani-ankit
          filename: github-metrics.svg
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Asia/Kolkata

          # Language breakdown (replaces the top-languages card)
          plugin_languages: yes
          plugin_languages_ignored: html, css, tex, less, dockerfile, makefile
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 8

          # Full-year contribution calendar
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

          # Commit the generated SVG back to the repo
          output_action: commit
          committer_message: "chore: update github-metrics.svg"
